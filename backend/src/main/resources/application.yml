server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: freediving-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/freediving?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:30MB}
      max-request-size: ${MAX_REQUEST_SIZE:35MB}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.qcloud.cos.http.DefaultCosHttpClient: warn

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:change-me}
    token-secret: ${ADMIN_TOKEN_SECRET:${ADMIN_TOKEN:change-me}}
    token-ttl-hours: ${ADMIN_TOKEN_TTL_HOURS:12}
  user:
    token-secret: ${USER_TOKEN_SECRET:${ADMIN_TOKEN_SECRET:${ADMIN_TOKEN:change-me}}}
    token-ttl-hours: ${USER_TOKEN_TTL_HOURS:720}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    secret: ${WECHAT_SECRET:}
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-guangzhou}
    bucket-name: ${COS_BUCKET_NAME:}
    public-base-url: ${COS_PUBLIC_BASE_URL:}
    public-read: ${COS_PUBLIC_READ:true}
